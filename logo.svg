<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes draw {
      0% { stroke-dasharray: 0 189; stroke-dashoffset: 0; }
      50% { stroke-dasharray: 189 0; stroke-dashoffset: 0; }
      100% { stroke-dasharray: 0 189; stroke-dashoffset: -189; }
    }
    @keyframes glow {
      0%, 100% { opacity: 1; filter: drop-shadow(0 0 2px #4ade80); }
      50% { opacity: 0.4; filter: drop-shadow(0 0 0px #4ade80); }
    }
    .outer-ring {
      stroke-dasharray: 189;
      animation: draw 4s linear infinite;
    }
    .pulse-dot {
      animation: glow 2s ease-in-out infinite;
    }
  </style>
  
  <circle class="outer-ring" cx="32" cy="32" r="30" stroke="#4ade80" stroke-width="2" stroke-linecap="round" />
  
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Geist, sans-serif" font-weight="800" font-size="22" fill="#4ade80">SR</text>
  
  <circle class="pulse-dot" cx="48" cy="18" r="4" fill="#4ade80" />
</svg>
